version: '3.9'

services:
  # ─── API ───────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      target: production
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://saas_user:saas_pass@postgres:5432/saas_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ''
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-min-32-chars}
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      RATE_LIMIT_MAX: 100
      RATE_LIMIT_WINDOW_MS: 60000
      QUEUE_EMAIL: email-queue
      QUEUE_REPORT: report-queue
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_FROM: noreply@saas.local
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - saas-net

  # ─── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: saas_user
      POSTGRES_PASSWORD: saas_pass
      POSTGRES_DB: saas_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U saas_user -d saas_db']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - saas-net

  # ─── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 20 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - saas-net

  # ─── Mailhog (dev email catcher) ───────────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    ports:
      - '1025:1025'  # SMTP
      - '8025:8025'  # Web UI
    networks:
      - saas-net

  # ─── Prisma migrations (run once) ─────────────────────────────────────────
  migrate:
    build:
      context: .
      target: builder
    command: npx prisma migrate deploy
    environment:
      DATABASE_URL: postgresql://saas_user:saas_pass@postgres:5432/saas_db
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - saas-net
    restart: 'no'

volumes:
  postgres_data:
  redis_data:

networks:
  saas-net:
    driver: bridge
